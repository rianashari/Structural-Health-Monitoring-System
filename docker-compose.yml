services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  db:
    image: postgres:15-alpine
    container_name: shm-db
    restart: always
    environment:
      POSTGRES_DB: shm_database
      POSTGRES_USER: shm_user
      POSTGRES_PASSWORD: smpn216jakarta
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shm_user -d shm_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Django Backend + MQTT Listener
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shm-backend
    restart: always
    environment:
      - DEBUG=False
      - SECRET_KEY=oIKIq1tS7coo7eewnRiqvVRGXVPVoyRLlfM3pGrnQpRSc7fpQEMYUHUhHvyu6d0jJjI
      - ALLOWED_HOSTS=110.232.92.134,localhost,backend
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=shm_database
      - DB_USER=shm_user
      - DB_PASSWORD=smpn216jakarta
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ============================================================
  # Next.js Frontend
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shm-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://110.232.92.134:3001/api
    depends_on:
      - backend

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: shm-nginx
    restart: always
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  static_files:
